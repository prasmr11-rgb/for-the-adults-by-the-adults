<!DOCTYPE html>
<html>
<head>
    <title>For The Adults By The Adults</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        header {
            background: black;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            color: red;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 40px;
        }

        .product {
            background: #1a1a1a;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: red;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<header>For The Adults By The Adults</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/250" />
        <h3>RCB Attitude Tee</h3>
        <p>₹349</p>
        <button>Order Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" />
        <h3>Dark Humor Tee</h3>
        <p>₹399</p>
        <button>Order Now</button>
    </div>

</div>

</body>
</html>
